# docker-compose.yml — local-dev only. Profile `local` brings up
# PostgreSQL + backend + frontend so a developer can run the full stack
# without Replit.
#
# Usage:
#   docker compose --profile local up --build -d
#   docker compose --profile local down -v
#
# Production / Replit Deployment does NOT use this file. Replit runs
# `mvn package` + `java -jar` directly (see .replit [deployment]).

name: replit-mvp

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["local"]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-app}
      POSTGRES_USER:     ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["local"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      PORT:                   8080
      JAVA_OPTS:              ${JAVA_OPTS:-}
      POSTGRES_DB:            ${POSTGRES_DB:-app}
      POSTGRES_USER:          ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD:-app}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      APP_CONTEXT_PATH:       ${APP_CONTEXT_PATH:-}
      APP_SERVICE_NAME:       ${APP_SERVICE_NAME:-generated-mvp}
      AUTH_ALLOWED_EMAIL_DOMAIN: ${AUTH_ALLOWED_EMAIL_DOMAIN:-aidigital.com}
      AUTH_AUTHORIZED_PARTIES: ${AUTH_AUTHORIZED_PARTIES:-http://localhost:5173,http://localhost:5000}
      CLERK_PUBLISHABLE_KEY:  ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY:         ${CLERK_SECRET_KEY:-}
      AUTH_ISSUER_URI:        ${AUTH_ISSUER_URI:-}
      AUTH_JWKS_URI:          ${AUTH_JWKS_URI:-}
      AUTH_AUDIENCE:          ${AUTH_AUDIENCE:-}
      USAGE_LOGGING_ENABLED:  ${USAGE_LOGGING_ENABLED:-true}
      USAGE_LOG_SERVICE_NAME: ${USAGE_LOG_SERVICE_NAME:-generated-mvp}
      USAGE_LOG_ENVIRONMENT:  ${USAGE_LOG_ENVIRONMENT:-dev}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080$${APP_CONTEXT_PATH:-}/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    profiles: ["local"]
    environment:
      APP_CONTEXT_PATH: ${APP_CONTEXT_PATH:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pg_data:
